# ============================================================
# Job Scraper — URL Config
# ============================================================
# HOW TO USE:
#   - type: greenhouse  → uses Greenhouse public JSON API (most reliable)
#   - type: lever       → uses Lever public JSON API
#   - type: linkedin    → uses Playwright scraper
#   - type: generic     → uses CSS selectors (add 'selectors' block)
#
# For Greenhouse: URL format is always https://boards.greenhouse.io/{token}
# The token is the company slug after the last slash.
# ============================================================

